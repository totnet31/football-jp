<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="football-jp logo: Stitch Ball">
  <title>football-jp / Stitch Ball</title>
  <desc>黒いサッカーボールに白いステッチを浮かべ、中央に小さく日の丸を配したミニマルロゴ。</desc>

  <!-- Black ball -->
  <circle cx="100" cy="100" r="92" fill="#0d0d0d"/>

  <!-- White stitches (geometric ball panel hints) -->
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center pentagon -->
    <polygon points="100,80 119,94 112,116 88,116 81,94"/>
    <!-- Lines from pentagon to outer -->
    <line x1="100" y1="80" x2="100" y2="40"/>
    <line x1="119" y1="94" x2="158" y2="80"/>
    <line x1="112" y1="116" x2="142" y2="156"/>
    <line x1="88" y1="116" x2="58" y2="156"/>
    <line x1="81" y1="94" x2="42" y2="80"/>
    <!-- Outer hexagonal panel hints -->
    <path d="M 100,40 Q 130,52 158,80"/>
    <path d="M 158,80 Q 168,118 142,156"/>
    <path d="M 142,156 Q 100,170 58,156"/>
    <path d="M 58,156 Q 32,118 42,80"/>
    <path d="M 42,80 Q 70,52 100,40"/>
  </g>

  <!-- Central Hinomaru -->
  <circle cx="100" cy="100" r="11" fill="#BC002D"/>
</svg>
