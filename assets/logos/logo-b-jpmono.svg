<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="football-jp logo: JP Mono">
  <title>football-jp / JP Mono</title>
  <desc>黒の丸角バッジに白抜きで「JP」を刻んだプレミアムなモノマーク。右上に日の丸の小赤ドット。</desc>

  <!-- Black rounded square -->
  <rect x="14" y="14" width="172" height="172" rx="34" fill="#0d0d0d"/>

  <!-- "JP" white knockout text (custom geometric letterform) -->
  <g fill="#ffffff">
    <!-- J: vertical bar + curve -->
    <path d="M 64,52
             L 90,52
             L 90,134
             Q 90,150 74,150
             L 56,150
             Q 40,150 40,134
             L 40,124
             L 60,124
             L 60,134
             Q 60,134 64,134
             Z"/>
    <!-- P: vertical bar + bowl -->
    <path d="M 110,52
             L 134,52
             Q 156,52 156,72
             L 156,90
             Q 156,108 134,108
             L 130,108
             L 130,150
             L 110,150
             Z
             M 130,72
             L 130,88
             L 134,88
             Q 138,88 138,82
             L 138,78
             Q 138,72 134,72
             Z"
             fill-rule="evenodd"/>
  </g>

  <!-- Hinomaru accent (top-right) -->
  <circle cx="166" cy="44" r="9" fill="#BC002D"/>
</svg>
