name: 毎朝データ更新

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 翌7:00 JST（朝・全データ更新）
    - cron: '0 3 * * *'   # 3:00 UTC = 12:00 JST（昼・EL/ECL等の朝試合の結果反映）
    - cron: '0 9 * * *'   # 9:00 UTC = 18:00 JST（夕方・WikipediaがUEFA戦の結果を反映した頃）
  workflow_dispatch:        # GitHubの画面から手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリを取得（develop ブランチ）
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0  # main も参照したいので全履歴

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: APIキーを設定
        run: echo "FOOTBALL_DATA_TOKEN=${{ secrets.FOOTBALL_DATA_TOKEN }}" > .env

      - name: 既存コード変更があれば main から取り込み
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # main の変更を develop に反映（コンフリクト時はdevelop優先）
          git merge origin/main --no-edit -X theirs || true

      - name: データ取得スクリプトを実行
        run: python3 scripts/fetch_matches.py

      - name: sitemap.xml 自動生成
        run: python3 scripts/generate_sitemap.py
        continue-on-error: true

      - name: W杯2026データ取得
        run: python3 scripts/fetch_wc.py

      - name: Wikipedia イベント取得（日本人選手の得点）
        run: python3 scripts/fetch_wiki_events.py
        continue-on-error: true

      - name: YouTube ハイライト取得（DAZN/U-NEXT/WOWOW公式のみ）
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -n "$YOUTUBE_API_KEY" ]; then
            echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
            python3 scripts/fetch_youtube_highlights.py
          else
            echo "YOUTUBE_API_KEY secret 未設定のためスキップ"
          fi
        continue-on-error: true

      - name: 日本人選手ニュース取得（RSS集約）
        run: python3 scripts/fetch_news.py
        continue-on-error: true

      - name: EL/ECL 準決勝・決勝データ取得（Wikipedia）
        run: python3 scripts/fetch_uefa_secondary.py
        continue-on-error: true

      - name: 選手統計取得（Wikipedia season ページ）
        run: python3 scripts/fetch_wiki_player_stats.py
        continue-on-error: true

      - name: クラブエンブレム取得（Tier2/Tier3 補完）
        run: python3 scripts/fetch_club_crests.py
        continue-on-error: true

      - name: クラブ基本情報取得（Wikipedia infobox）
        run: python3 scripts/fetch_club_info.py
        continue-on-error: true

      - name: 選手プロフィール情報取得（Wikipedia infobox）
        run: python3 scripts/fetch_player_info.py
        continue-on-error: true

      - name: 選手プロフィールページ生成
        run: python3 scripts/generate_player_pages.py
        continue-on-error: true

      - name: クラブページ生成
        run: python3 scripts/generate_club_pages.py
        continue-on-error: true

      - name: スモークテスト（data整合性チェック）
        id: smoke
        run: python3 scripts/smoke_test.py

      - name: developにデータ変更を保存
        id: commit_data
        run: |
          git add data/ players/ clubs/
          if git diff --cached --quiet; then
            echo "no_change=true" >> $GITHUB_OUTPUT
            echo "データ変更なし"
          else
            git commit -m "data: $(TZ=Asia/Tokyo date '+%Y-%m-%d') 自動更新"
            git push origin develop
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: スモークOKならmainにマージ（data・pages）
        if: steps.commit_data.outputs.no_change != 'true'
        run: |
          # main に切替
          git checkout main
          git pull origin main
          # develop の data/ players/ clubs/ を main に反映
          git checkout develop -- data/ players/ clubs/
          if git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "main 側に変更が無いためスキップ"
          else
            git add data/ players/ clubs/
            git diff --cached --quiet || git commit -m "data: $(TZ=Asia/Tokyo date '+%Y-%m-%d') 自動更新（develop→main）"
            git push origin main
          fi

      - name: 失敗時にDiscordへ通知
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret が未設定のため通知スキップ"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="⚠️ football-jp の自動データ更新が失敗しました（main未反映の可能性）\\nRun: $RUN_URL"
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" || true
