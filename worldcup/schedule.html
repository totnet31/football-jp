    /* 放送局タグ（bc-tag ベース＋W杯局オーバーライド） */

    .bc-tag .bc-logo { width: 16px; height: 16px; object-fit: contain; background: rgba(255,255,255,0.95); border-radius: 3px; padding: 1px; }

      <label><input type="checkbox" id="filterJapan"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> 日本代表のみ</label>

<script>
(async () => {
  // ---- データ取得 ----
  let matches = [];
  let broadcasts = {};
  const bcAffiliateMap = new Map();
  const bcInfo = new Map();
  try {
    const [mRes, bRes, bcsRes] = await Promise.all([
      fetch('../data/wc2026/matches.json'),
      fetch('../data/wc2026/broadcasts.json'),
      fetch('/data/broadcasters.json')
    ]);
    const mData = await mRes.json();
    matches = mData.matches || [];
    const bData = await bRes.json();
    broadcasts = bData.broadcasts || {};
    const bcsData = await bcsRes.json();
    if (bcsData.services) {
      for (const [name, info] of Object.entries(bcsData.services)) {
        if (info.affiliate_url) bcAffiliateMap.set(name, info.affiliate_url);
        bcInfo.set(name, info);
      }
    }
  } catch (e) {
    document.getElementById('matchesList').innerHTML =
      '<p class="schedule-empty">データの読み込みに失敗しました。ページを再読み込みしてください。</p>';
    return;
  }

  // ---- 状態 ----
  let activeTab = 'upcoming';
  let filterFree = false;
  let filterJapan = false;
  let filterStage = '';

  // ---- タブ切替 ----
  document.querySelectorAll('.schedule-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.schedule-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      render();
    });
  });

  // ---- フィルタ ----
  document.getElementById('filterFree').addEventListener('change', e => {
    filterFree = e.target.checked;
    render();
  });
  document.getElementById('filterJapan').addEventListener('change', e => {
    filterJapan = e.target.checked;
    render();
  });
  document.getElementById('filterStage').addEventListener('change', e => {
    filterStage = e.target.value;
    render();
  });

  // ---- レンダリング ----
  function render() {
    const isFinished = activeTab === 'finished';
    let list = matches.filter(m => {
      if (isFinished) return m.status === 'FINISHED';
      return m.status !== 'FINISHED';
    });

    if (filterFree) {
      list = list.filter(m => broadcasts[String(m.id)] && broadcasts[String(m.id)].free);
    }
    if (filterJapan) {
      list = list.filter(m => m.home_tla === 'JPN' || m.away_tla === 'JPN');
    }
    if (filterStage) {
      list = list.filter(m => m.stage === filterStage);
    }

    if (!list.length) {
      document.getElementById('matchesList').innerHTML =
        '<p class="schedule-empty">該当する試合がありません</p>';
      return;
    }

    // 日付グループ化
    const groups = {};
    list.forEach(m => {
      const ko = new Date(m.kickoff_jst);
      const dKey = ko.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
      if (!groups[dKey]) groups[dKey] = [];
      groups[dKey].push(m);
    });

    let html = '';
    for (const [dateStr, dayMatches] of Object.entries(groups)) {
      html += `<div class="schedule-date-header">${dateStr}</div>`;
      dayMatches.forEach(m => { html += renderMatch(m); });
    }
    document.getElementById('matchesList').innerHTML = html;
  }

  function renderMatch(m) {
    const ko = new Date(m.kickoff_jst);
    const timeStr = ko.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const bc = broadcasts[String(m.id)];
    const isJapan = m.home_tla === 'JPN' || m.away_tla === 'JPN';
    const matchCls = isJapan ? 'wc-match japan-match' : 'wc-match';

    const finished = m.status === 'FINISHED';
    const score = m.score;
    const homeScore = (finished && score) ? score.home : null;
    const awayScore = (finished && score) ? score.away : null;
    const homeWin = homeScore !== null && homeScore > awayScore;
    const awayWin = awayScore !== null && awayScore > homeScore;

    const homeScoreHtml = homeScore !== null
      ? `<span class="wc-team-score has-score">${homeScore}</span>`
      : `<span class="wc-team-score">—</span>`;
    const awayScoreHtml = awayScore !== null
      ? `<span class="wc-team-score has-score">${awayScore}</span>`
      : `<span class="wc-team-score">—</span>`;

    // 放送局タグ（bc-tag スタイル）
    let badgesHtml = '';
    if (bc && bc.broadcasters && bc.broadcasters.length) {
      badgesHtml = `<div class="bc-tags-row">${renderBroadcasterTags(bc.broadcasters)}</div>`;
    }

    return `<div class="${matchCls}">
  <div class="wc-match-top">
    <div class="wc-kickoff">${timeStr}<small>JST</small></div>
    <div class="wc-teams">
      <div class="wc-team-row${homeWin ? ' winner' : ''}">
        <span class="wc-team-flag">${m.home_flag || '🌐'}</span>
        <div class="wc-team-mid">
          <span class="wc-team-name">${escapeHtml(m.home_ja)}</span>
          <span class="wc-team-tla">${escapeHtml(m.home_tla || '')}</span>
        </div>
        ${homeScoreHtml}
      </div>
      <div class="wc-team-row${awayWin ? ' winner' : ''}">
        <span class="wc-team-flag">${m.away_flag || '🌐'}</span>
        <div class="wc-team-mid">
          <span class="wc-team-name">${escapeHtml(m.away_ja)}</span>
          <span class="wc-team-tla">${escapeHtml(m.away_tla || '')}</span>
        </div>
        ${awayScoreHtml}
      </div>
    </div>
  </div>
  <div class="wc-tags">
    ${m.group ? `<span class="wc-tag group">${escapeHtml(m.group.replace('GROUP_', 'G'))}</span>` : ''}
    <span class="wc-tag stage">${stageJa(m.stage, m.matchday)}</span>
    ${finished ? '<span class="wc-tag status-finished">終了</span>' : ''}
    ${m.status === 'IN_PLAY' || m.status === 'PAUSED' ? '<span class="wc-tag status-live">LIVE</span>' : ''}
    ${m.venue ? `<span class="wc-tag" style="color:var(--wc-text-sub,#8899bb);background:transparent;border-color:transparent;font-size:11px;">📍${escapeHtml(m.venue)}</span>` : ''}
  </div>
  ${badgesHtml}
</div>`;
  }

  function renderBroadcasterTags(broadcasters) {
    return broadcasters.map(name => {
      const info = bcInfo.get(name);
      const linkUrl = bcAffiliateMap.get(name) || (info && info.url) || null;
      const cls = bcBrandClass(name);
      let logoHtml;
      if (info && info.logo) {
        logoHtml = `<img class="bc-logo" src="/assets/broadcasters/${escapeHtml(info.logo)}" alt="" width="16" height="16" loading="lazy">`;
      } else {
        // SVGテキストロゴフォールバック（1〜2文字の局名略称）
        const abbr = escapeHtml(name.slice(0, 2));
        logoHtml = `<svg class="bc-logo" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect width="16" height="16" rx="2" fill="rgba(255,255,255,0.2)"/><text x="8" y="11.5" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">${abbr}</text></svg>`;
      }
      const inner = `${logoHtml}${escapeHtml(name)}`;
      if (linkUrl) {
        return `<a class="bc-tag ${cls}" href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener nofollow">${inner}</a>`;
      } else {
        return `<span class="bc-tag ${cls}">${inner}</span>`;
      }
    }).join('');
  }

  function bcBrandClass(name) {
    if (name.includes('NHK総合')) return 'bc-nhk-so';
    if (name.includes('NHK BS')) return 'bc-nhk-bs';
    if (name.includes('日本テレビ')) return 'bc-ntv';
    if (name.includes('フジテレビ')) return 'bc-fuji';
    if (name.includes('DAZN')) return 'bc-dazn';
    return 'bc-other';
  }

  function stageJa(stage, md) {
    const map = {
      'GROUP_STAGE':   `グループステージ${md ? ' 第' + md + '節' : ''}`,
      'LAST_32':       '決勝T 1回戦',
      'LAST_16':       '決勝T 2回戦',
      'QUARTER_FINALS':'準々決勝',
      'SEMI_FINALS':   '準決勝',
      'THIRD_PLACE':   '3位決定戦',
      'FINAL':         '決勝',
    };
    return map[stage] || stage;
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // 初期レンダリング
  render();
})();
</script>
