<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">国別プロフィール｜W杯2026</title>
  <meta name="description" content="2026 FIFAワールドカップ出場国の代表プロフィール。FIFAランク・過去成績・注目選手・日本との関係性。">
  <link rel="stylesheet" href="style.css">
  <style>
    .country-hero {
      background: linear-gradient(135deg, var(--wc-primary), #1a2754);
      color: white;
      border-radius: 12px;
      padding: 24px 22px;
      margin-bottom: 18px;
      text-align: center;
    }
    .country-hero .flag { font-size: 64px; line-height: 1; margin-bottom: 8px; }
    .country-hero h2 { margin: 0 0 4px; font-size: 26px; }
    .country-hero .en { font-size: 13px; opacity: 0.7; }
    .country-hero .group-tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 8px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .info-card {
      background: var(--wc-card);
      border: 1px solid var(--wc-border);
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }
    .info-card .label { font-size: 11px; color: var(--wc-text-sub); margin-bottom: 4px; }
    .info-card .value { font-size: 17px; font-weight: 700; color: var(--wc-primary); }
    .country-section {
      background: var(--wc-card);
      border: 1px solid var(--wc-border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .country-section h3 { margin: 0 0 12px; font-size: 16px; color: var(--wc-primary); border-bottom: 2px solid var(--wc-primary); padding-bottom: 6px; }
    .country-section p { margin: 0 0 8px; line-height: 1.7; }
    .player-card {
      background: #fafafa;
      border: 1px solid var(--wc-border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .player-card .name { font-size: 14px; font-weight: 700; }
    .player-card .meta { font-size: 12px; color: var(--wc-text-sub); margin: 2px 0 6px; }
    .player-card .note { font-size: 13px; }
    .stub-warning {
      background: #fff8ed;
      border: 1px solid #f0d8a0;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.7;
    }
    .matches-list {
      margin-top: 10px;
    }
    .squad-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 4px;
    }
    .squad-table th {
      background: #f0f1f5;
      color: var(--wc-primary);
      font-weight: 600;
      font-size: 11px;
      padding: 8px 6px;
      text-align: left;
      border-bottom: 2px solid var(--wc-primary);
    }
    .squad-table td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--wc-border);
      font-size: 12px;
    }
    .squad-table td.num {
      text-align: right;
      font-feature-settings: "tnum";
    }
    .squad-table tr.pos-GK { background: #fff3e6; }
    .squad-table tr.pos-DF { background: #e8f0fb; }
    .squad-table tr.pos-MF { background: #f0f6e8; }
    .squad-table tr.pos-FW { background: #ffeef0; }
    .squad-table .pos-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }
    .pos-tag.GK { background: #e07b00; }
    .pos-tag.DF { background: #2c5e9e; }
    .pos-tag.MF { background: #5a8a3a; }
    .pos-tag.FW { background: #c1304a; }
    .squad-disclaimer {
      background: #fff8ed;
      border-left: 3px solid #d4af37;
      padding: 8px 12px;
      margin: 10px 0;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="wc-page">

<header class="wc-header">
  <a href="../" class="wc-back-link">⚽ football-jp トップへ</a>
  <h1 id="headerTitle">国別プロフィール</h1>
  <p class="wc-tagline" id="headerSub">2026 FIFAワールドカップ 出場国</p>
</header>

<div class="wc-container">

  <nav class="wc-nav">
    <a href="./">📅 トップ</a>
    <a href="./japan.html">🇯🇵 日本代表</a>
    <a href="./groups.html">📊 グループ順位</a>
    <a href="./bracket.html">🏆 トーナメント</a>
    <a href="./countries.html" class="active">🌍 48か国</a>
    <a href="./rules.html">📜 ルール</a>
  </nav>

  <div id="content"></div>

  <p style="margin-top: 20px;"><a href="./countries.html" style="color:var(--wc-primary); font-size: 13px;">← 48か国一覧に戻る</a></p>

  <footer class="wc-footer">
    <p>データ提供: <a href="https://www.football-data.org/" target="_blank" rel="noopener">Football data provided by the Football-Data.org API</a></p>
    <p>このページは2026 FIFA W杯の期間限定特集です／<a href="../">football-jp トップへ</a></p>
  </footer>
</div>

<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const tla = (params.get('tla') || 'JPN').toUpperCase();

  const [profilesRes, matchesRes, squadsRes] = await Promise.all([
    fetch('../data/wc2026/country_profiles.json'),
    fetch('../data/wc2026/matches.json'),
    fetch('../data/wc2026/squads.json').catch(() => null),
  ]);
  const profiles = (await profilesRes.json()).profiles;
  const matches = (await matchesRes.json()).matches || [];
  const squadsData = squadsRes ? await squadsRes.json().catch(() => null) : null;
  const squad = squadsData ? squadsData[tla] : null;

  const p = profiles[tla];
  if (!p) {
    document.getElementById('content').innerHTML = '<div class="stub-warning">指定された国（' + escapeHtml(tla) + '）のプロフィールが見つかりません。<br><a href="./countries.html">48か国一覧に戻る</a></div>';
    return;
  }

  // タイトル更新
  document.getElementById('pageTitle').textContent = `${p.ja} 代表プロフィール｜W杯2026`;
  document.getElementById('headerTitle').innerHTML = `${p.flag} ${escapeHtml(p.ja)}`;
  document.getElementById('headerSub').textContent = `${p.en}（Group ${p.group}）`;

  // この国の試合（グループステージ）
  const teamMatches = matches.filter(m => m.home_tla === tla || m.away_tla === tla)
    .sort((a, b) => a.kickoff_jst.localeCompare(b.kickoff_jst));

  let html = `
    <div class="country-hero">
      <div class="flag">${p.flag}</div>
      <h2>${escapeHtml(p.ja)}</h2>
      <div class="en">${escapeHtml(p.en)}</div>
      <span class="group-tag">Group ${p.group}</span>
    </div>
  `;

  if (p.detailed) {
    // 詳細プロフィール（4か国）
    html += `
      <div class="info-grid">
        <div class="info-card"><div class="label">FIFAランク</div><div class="value">${p.fifa_rank ? p.fifa_rank + '位' : '—'}</div></div>
        <div class="info-card"><div class="label">W杯出場回数</div><div class="value">${p.wc_appearances ? p.wc_appearances + '回' : '—'}</div></div>
        <div class="info-card"><div class="label">監督</div><div class="value" style="font-size:13px;">${escapeHtml(p.manager || '—')}</div></div>
      </div>

      <section class="country-section">
        <h3>📋 サマリー</h3>
        <p>${escapeHtml(p.summary || '—')}</p>
        ${p.expectations ? `<p><strong>期待値：</strong>${escapeHtml(p.expectations)}</p>` : ''}
      </section>

      <section class="country-section">
        <h3>🏆 過去W杯成績</h3>
        <p>${escapeHtml(p.best_result || '—')}</p>
      </section>

      <section class="country-section">
        <h3>🇯🇵 日本との関係性</h3>
        <p>${escapeHtml(p.japan_relation || '—')}</p>
      </section>

      <section class="country-section">
        <h3>⭐ 注目選手3名</h3>
        ${(p.key_players || []).map(pl => `
          <div class="player-card">
            <div class="name">${escapeHtml(pl.name)}</div>
            <div class="meta">${escapeHtml(pl.position)} ｜ ${escapeHtml(pl.club)}</div>
            <div class="note">${escapeHtml(pl.note || '')}</div>
          </div>
        `).join('')}
      </section>
    `;
  } else {
    // スタブ
    html += `
      <div class="stub-warning">
        ⏳ この国の詳細プロフィールは<strong>準備中</strong>です（順次拡充）。<br>
        現時点では基本情報のみ表示しています。
      </div>
      ${p.japan_relation ? `<section class="country-section">
        <h3>🇯🇵 日本との関係性</h3>
        <p>${escapeHtml(p.japan_relation)}</p>
      </section>` : ''}
    `;
  }

  // この国のグループステージ試合
  if (teamMatches.length > 0) {
    html += `
      <section class="country-section">
        <h3>📅 ${escapeHtml(p.ja)}の試合（グループステージ）</h3>
        <div class="matches-list">${teamMatches.map(m => renderMatchSummary(m, tla)).join('')}</div>
      </section>
    `;
  }

  // スカッド表
  if (squad && squad.players && squad.players.length > 0) {
    const players = squad.players.slice().sort((a, b) => {
      const posOrder = { GK: 0, DF: 1, MF: 2, FW: 3 };
      const pa = posOrder[a.pos] ?? 9;
      const pb = posOrder[b.pos] ?? 9;
      if (pa !== pb) return pa - pb;
      return (a.no || 0) - (b.no || 0);
    });
    const ageAt = (dob) => {
      try {
        const d = new Date(dob);
        const ref = new Date('2026-06-11');
        let age = ref.getFullYear() - d.getFullYear();
        const m = ref.getMonth() - d.getMonth();
        if (m < 0 || (m === 0 && ref.getDate() < d.getDate())) age--;
        return age;
      } catch { return ''; }
    };
    const rows = players.map(pl => {
      return `<tr class="pos-${pl.pos}">
        <td class="num">${pl.no || '—'}</td>
        <td><span class="pos-tag ${pl.pos}">${pl.pos || '—'}</span></td>
        <td><strong>${escapeHtml(pl.name_ja)}</strong><br><span style="font-size:10px;color:var(--wc-text-sub);">${escapeHtml(pl.name_en)}</span></td>
        <td>${escapeHtml(pl.club || '—')}</td>
        <td class="num">${pl.dob || '—'}<br><span style="font-size:10px;color:var(--wc-text-sub);">(${ageAt(pl.dob)}歳)</span></td>
        <td class="num">${pl.height_cm ? pl.height_cm + 'cm' : '—'}</td>
        <td class="num">${pl.weight_kg ? pl.weight_kg + 'kg' : '—'}</td>
      </tr>`;
    }).join('');
    html += `
      <section class="country-section">
        <h3>👥 ${escapeHtml(p.ja)}代表 全選手プロフィール（${players.length}名）</h3>
        <div class="squad-disclaimer">
          ⚠️ ${escapeHtml(squad.as_of || '参考データ')}を表示中。
          2026年最終スカッドは6/1のFIFA発表後に更新します。
          <span style="display:block; margin-top:4px; font-size:11px; color:var(--wc-text-sub);">出典: ${escapeHtml(squadsData._source || 'unknown')}</span>
        </div>
        <table class="squad-table">
          <thead>
            <tr><th>#</th><th>Pos</th><th>選手名</th><th>所属クラブ</th><th>生年月日</th><th>身長</th><th>体重</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </section>
    `;
  } else if (p && p.detailed) {
    // 詳細ページがあるけどスカッド未登録
    html += `
      <section class="country-section">
        <h3>👥 ${escapeHtml(p.ja)}代表 全選手プロフィール</h3>
        <div class="squad-disclaimer">
          ⏳ 全選手プロフィールは準備中です。<br>
          5/11の予備リスト（35〜55名）または6/1の最終スカッド（23〜26名）発表後に表示予定。
        </div>
      </section>
    `;
  }

  document.getElementById('content').innerHTML = html;
})();

function renderMatchSummary(m, currentTla) {
  const ko = new Date(m.kickoff_jst);
  const dateStr = ko.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', weekday: 'short' });
  const timeStr = ko.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const homeIsCurrent = m.home_tla === currentTla;
  const oppFlag = homeIsCurrent ? m.away_flag : m.home_flag;
  const oppName = homeIsCurrent ? m.away_ja : m.home_ja;
  const venue = homeIsCurrent ? 'ホーム表示' : 'アウェー表示';
  const score = m.score;
  let scoreStr = '—';
  if (score) {
    scoreStr = homeIsCurrent ? `${score.home} - ${score.away}` : `${score.away} - ${score.home}`;
  }
  return `
    <div class="player-card" style="display:grid; grid-template-columns: 80px 1fr auto; gap:12px; align-items:center;">
      <div style="font-size:11px; color:var(--wc-text-sub);">${dateStr}<br>${timeStr} JST</div>
      <div>vs <strong>${oppFlag} ${escapeHtml(oppName)}</strong></div>
      <div style="font-size:14px; font-weight:700;">${scoreStr}</div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>

</body>
</html>
