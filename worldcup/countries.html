<link rel="stylesheet" href="style.css">
  <style>
    .group-block {
      background: var(--wc-card);
      border: 1px solid var(--wc-border);
      border-radius: 4px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .group-block h3 {
      margin: 0 0 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--wc-primary);
      font-size: 16px;
      color: var(--wc-primary);
    }
    .country-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .country-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fafafa;
      border: 1px solid var(--wc-border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--wc-text);
      transition: all 0.15s;
    }
    .country-card:hover {
      background: white;
      border-color: var(--wc-primary);
      transform: translateY(-1px);
    }
    .country-card.is-japan {
      background: #fff5f7;
      border-color: var(--wc-japan);
      border-width: 2px;
    }
    .country-card .flag { font-size: 22px; line-height: 1; }
    .country-card .name { font-size: 13px; font-weight: 600; }
    .country-card .badge {
      margin-left: auto;
      background: #d4af37;
      color: white;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
  </style>

<body class="wc-page">

<header class="wc-header">
  <a href="../" class="wc-back-link">⚽ football-jp トップへ</a>
  <h1>🌍 48か国プロフィール</h1>
  <p class="wc-tagline">12グループ × 4チーム ＝ 全48か国／グループ別に並べ替え</p>
</header>

<div class="wc-container">

  <nav class="wc-nav" id="wcNav"></nav>
  <script src="wc-nav.js"></script>
  <script>document.getElementById('wcNav').innerHTML = wcRenderNav('countries');</script>

  <p class="wc-empty" style="text-align:left; padding: 12px 14px; background:#fff8ed; border:1px solid #f0d8a0; border-radius:4px; font-size:12px;">
    💡 各国カードをクリックで詳細プロフィールページへ。<span style="color:#d4af37; font-weight:700;">★</span>マーク＝詳細記述完了／無印＝スタブ（順次拡充中）
  </p>

  <div id="groupContent"></div>

  <footer class="wc-footer">
    <p>データ提供: <a href="https://www.football-data.org/" target="_blank" rel="noopener">Football data provided by the Football-Data.org API</a></p>
    <p>このページは2026 FIFA W杯の期間限定特集です／<a href="../">football-jp トップへ</a></p>
    <p class="footer-links"><a href="../privacy.html">プライバシーポリシー</a></p>
  </footer>
</div>

<script>
(async () => {
  const [countriesRes, profilesRes] = await Promise.all([
    fetch('../data/wc2026/countries.json'),
    fetch('../data/wc2026/country_profiles.json'),
  ]);
  const countriesData = await countriesRes.json();
  const profilesData = await profilesRes.json();
  const countries = countriesData.countries;
  const profiles = profilesData.profiles;

  // グループ別に整理
  const byGroup = {};
  for (const tla of Object.keys(profiles).filter(k => !k.startsWith('_'))) {
    const p = profiles[tla];
    const grp = p.group;
    if (!byGroup[grp]) byGroup[grp] = [];
    byGroup[grp].push({ tla, ...p });
  }

  const sortedGroups = Object.keys(byGroup).sort();
  const html = sortedGroups.map(g => {
    const list = byGroup[g];
    const cards = list.map(c => {
      const isJp = c.tla === 'JPN';
      const detailMark = c.detailed ? '<span class="badge">★ 詳細</span>' : '';
      return `<a href="./country.html?tla=${c.tla}" class="country-card ${isJp ? 'is-japan' : ''}">
        <span class="flag">${c.flag}</span>
        <span class="name">${escapeHtml(c.ja)}</span>
        ${detailMark}
      </a>`;
    }).join('');
    return `<div class="group-block">
      <h3>Group ${escapeHtml(g)}（4チーム）</h3>
      <div class="country-list">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('groupContent').innerHTML = html;
})();

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>

</body>
</html>
