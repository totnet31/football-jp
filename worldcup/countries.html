<script>
// TLA → slug マッピング（generate_country_pages.py と同期）
const TLA_SLUG = {
  "ALG": "algeria", "ARG": "argentina", "AUS": "australia", "AUT": "austria",
  "BEL": "belgium", "BIH": "bosnia-herzegovina", "BRA": "brazil", "CAN": "canada",
  "CPV": "cape-verde-islands", "COL": "colombia", "COD": "congo-dr", "CRO": "croatia",
  "CUR": "curacao", "CZE": "czechia", "ECU": "ecuador",
  "EGY": "egypt", "ENG": "england", "FRA": "france", "GER": "germany",
  "GHA": "ghana", "HAI": "haiti", "IRN": "iran", "IRQ": "iraq",
  "CIV": "ivory-coast", "JPN": "japan", "JOR": "jordan", "MEX": "mexico",
  "MAR": "morocco", "NED": "netherlands", "NZL": "new-zealand", "NOR": "norway",
  "PAN": "panama", "PAR": "paraguay", "POR": "portugal", "QAT": "qatar",
  "KSA": "saudi-arabia", "SCO": "scotland", "SEN": "senegal", "RSA": "south-africa",
  "KOR": "south-korea", "ESP": "spain", "SWE": "sweden", "SUI": "switzerland",
  "TUN": "tunisia", "TUR": "turkey", "USA": "united-states", "URU": "uruguay",
  "UZB": "uzbekistan"
};

function tlaToSlug(tla) {
  if (TLA_SLUG[tla]) return TLA_SLUG[tla];
  // フォールバック: en から動的生成
  return tla.toLowerCase();
}

(async () => {
  const [countriesRes, profilesRes] = await Promise.all([
    fetch('../data/wc2026/countries.json'),
    fetch('../data/wc2026/country_profiles.json'),
  ]);
  const countriesData = await countriesRes.json();
  const profilesData = await profilesRes.json();
  const countries = countriesData.countries;
  const profiles = profilesData.profiles;

  // グループ別に整理
  const byGroup = {};
  for (const tla of Object.keys(profiles).filter(k => !k.startsWith('_'))) {
    const p = profiles[tla];
    const grp = p.group;
    if (!byGroup[grp]) byGroup[grp] = [];
    byGroup[grp].push({ tla, ...p });
  }

  const sortedGroups = Object.keys(byGroup).sort();
  const html = sortedGroups.map(g => {
    const list = byGroup[g];
    const cards = list.map(c => {
      const isJp = c.tla === 'JPN';
      const detailMark = c.detailed ? '<span class="badge">★ 詳細</span>' : '';
      const slug = tlaToSlug(c.tla);
      return `<a href="./countries/${slug}/" class="country-card ${isJp ? 'is-japan' : ''}">
        <span class="flag">${c.flag}</span>
        <span class="name">${escapeHtml(c.ja)}</span>
        ${detailMark}
      </a>`;
    }).join('');
    return `<div class="group-block">
      <h3>Group ${escapeHtml(g)}（4チーム）</h3>
      <div class="country-list">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('groupContent').innerHTML = html;
})();

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
